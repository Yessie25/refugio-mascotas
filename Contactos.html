<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos - Refugio de Mascotas</title>
    <link rel="stylesheet" href="css/contacto.css">
</head>
<body>
    <header>
        <img src="img/libro.png" alt="Logo" width="90" height="90">
        <h1>Refugio de Mascotas</h1>
        <p>Contáctanos para adoptar o colaborar 🐾</p>
    </header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="noticias.html">Noticias</a>
        <a href="contactos.html" class="active">Contactos</a>
    </nav>

    <main>
        <article>
            <h2>Formulario de contacto</h2>
            <form id="contactForm">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" required>

                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" required>

                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" rows="4" required></textarea>

                <button type="submit">Enviar mensaje</button>
            </form>
        </article>

        <article>
            <h2>Ubicación y horarios</h2>
            <p>Calle de los Animales 123, Ciudad Esperanza</p>
            <p>Lunes a sábado: 9:00 - 18:00</p>
            <p>Teléfono: +591 65526032</p>
        </article>
    </main>

    <footer>
        <div class="social">
            <a href="https://www.facebook.com/" target="_blank"><img src="img/face.png" alt="Facebook"></a>
            <a href="https://wa.me/59165526032" target="_blank"><img src="img/whatsapp.png" alt="WhatsApp"></a>
            <a href="https://www.instagram.com/" target="_blank"><img src="img/ig.png" alt="Instagram"></a>
        </div>
        <p>© 2025 Refugio de Mascotas — Todos los derechos reservados</p>
    </footer>

    <script src="js/script.js" defer></script>
</body>
</html>
